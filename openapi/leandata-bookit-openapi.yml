        <td>Duration metadata (<code>unit</code>, <code>value</code>).</td>

        </tr>

        <tr>

        <td><code>formFields</code></td>

        <td>object[]</td>

        <td>Fields required to book the meeting.</td>

        </tr>

        <tr>

        <td><code>description</code></td>

