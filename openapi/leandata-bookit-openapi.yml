    patch:
      tags:
        - 📆 Meetings > Manage
      summary: v1/meeting/:meetingId
      description: >
        <p>This endpoint is used to reschedule an existing meeting by providing
        a new start and end time.</p>

        <p>💡 The <code>:meetingId</code> path parameter should be replaced with
        the unique ID of the meeting you want to update.</p>

        <hr />

        <h4 id="request-body-parameters">Request Body Parameters</h4>

        <ul>

        <li><p><code>scheduledTime</code> (required) — An
        <strong>object</strong> that defines the selected meeting time.</p>

        <ul>

        <li><p><code>start_time</code> (required) — A <strong>number</strong>
        representing the meeting start time in Unix epoch milliseconds.</p>

        </li>

        <li><p><code>end_time</code> (required) — A <strong>number</strong>
        representing the meeting end time in Unix epoch milliseconds.</p>

        </li>

        <li><p><code>timezone</code> — A <strong>string</strong> in IANA format
        (e.g. <code>America/Los_Angeles</code>). This value is used solely for
        <strong>formatting</strong> the confirmation email sent to the prospect.
        The actual meeting time is determined using the raw timestamps.</p>

        </li>

        </ul>

        </li>

        </ul>

        <hr />

        <h4 id="response-body-parameters">Response Body Parameters</h4>

        <ul>

        <li><p><code>meetingId</code> — A <strong>string</strong> representing
        the unique identifier for the booked meeting.</p>

        </li>

        <li><p><code>organizerEmail</code> — A <strong>string</strong>
        containing the email address of the assigned rep who will host the
        meeting.</p>

        </li>

        </ul>
