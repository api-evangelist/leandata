  /v1/scheduling/retrieve-modification-info:
    post:
      tags:
        - Legacy (still supported)
      summary: v1/scheduling/retrieve-modification-info (legacy)
      description: >
        <p>This endpoint returns the same scheduling payload as
        <code>v1/scheduling/retrieve-info</code>, but is specifically
        <strong>used when rescheduling or canceling an existing
        meeting</strong>. Use this endpoint to retrieve all necessary data to
        re-render the scheduling UI in a modification flow.</p>

        <hr />

        <h4 id="request-body-parameters">Request Body Parameters</h4>

        <ul>

        <li><p><code>eventId</code> (required) — A <strong>string</strong>
        representing the unique identifier of the booked meeting. This should be
        the <code>eventId</code> returned from a successful booking via the
        <code>/v1/meeting</code> or <code>/v1/round-robin-meeting</code>
        endpoints. It is required to retrieve the scheduling information for
        rescheduling or canceling the meeting.</p>

        <ul>

        <li>❗️<strong>Note:</strong> The BookIt API appends the
        <code>eventId</code> to the end of the <code>rescheduleLink</code> and
        <code>cancelLink</code> (provided during booking), which are sent to the
        prospect in the post-scheduling emails. When the prospect clicks one of
        these links, they are directed to your reschedule or cancel page. You
        can extract the <code>eventId</code> directly from the URL when the page
        loads.</li>

        </ul>

        </li>

        </ul>

        <hr />

        <h4 id="response-body-parameters">Response Body Parameters</h4>

        <ul>

        <li><p><code>event</code> — An <strong>object</strong> representing the
        existing meeting being modified</p>

        <ul>

        <li><p><code>id</code> — A <strong>string</strong> unique identifier for
        the meeting.</p>

        </li>

        <li><p><code>status</code> — A <strong>string</strong> representing the
        meeting status (e.g., <code>"confirmed"</code>).</p>

        </li>

        <li><p><code>when</code> — An <strong>object</strong> indicating the
        start and end times.</p>

        <ul>

        <li><p><code>start_time</code> — A <strong>number</strong> (UNIX
        timestamp) for when the meeting starts.</p>

        </li>

        <li><p><code>end_time</code> — A <strong>number</strong> (UNIX
        timestamp) for when the meeting ends.</p>

        </li>

        </ul>

        </li>

        <li><p><code>organizer_email</code> — A <strong>string</strong>
        representing the email of the meeting organizer.</p>

        </li>

        </ul>

        </li>

        <li><p><code>meeting</code> — An <strong>object</strong> that contains
        configuration details about the meeting type.</p>

        <ul>

        <li><p>❗️<strong>Note:</strong> All data in the <code>meeting</code>
        object is sourced directly from the <strong>Meeting Type
        c</strong>onfiguration in the LeanData application. If any updates or
        changes are needed to this information—such as duration, description,
        buffer settings, etc.—they must be made in the LeanData application
        under the corresponding Meeting Type configuration. This data cannot be
        modified through the API.</p>

        </li>

        <li><p><code>name</code> — A <strong>string</strong> that contains the
        name of the meeting type</p>

        </li>

        <li><p><code>duration</code> — An <strong>object</strong> that describes
        the meeting duration</p>

        <ul>

        <li><p><code>unit</code> — A <strong>string</strong> that represents the
        time unit. (e.g. <code>min</code>)</p>

        </li>

        <li><p><code>value</code> — A <strong>number</strong> that represents
        the duration value</p>

        </li>

        </ul>

        </li>

        <li><p><code>formFields</code> — An <strong>array of 9 form field
        objects</strong> that represent the input fields required to finalize
        the booking of the meeting. These form fields should appear on the
        <strong>final confirmation screen</strong> before the meeting is booked
        as these form values are used as variables in confirmation emails.
        LeanData will also use these values to send the confirmation email to.
        The fields are configured in the <strong>Meeting Type</strong>
        configuration under the "<strong>Additional Questions</strong>" tab in
        the LeanData application— The default and required form fields are
        <code>First Name</code>, <code>Last Name</code>, <code>Email</code>, and
        <code>Additional Guest Emails</code>. Admins can configure up to 5
        <strong>additional custom questions.</strong></p>

        <ul>

        <li><p>The fields that represent the optional additional questions will
        have a property of <code>isAdditionalQuestion: true</code>. If no
        additional questions are configured in the Meeting Type, these fields
        will have empty <code>name</code> values and should be treated as
        unused.</p>

        </li>

        <li><p>❗️ <strong>Important</strong>: You must send back values for
        <strong>all defined fields</strong> when booking a meeting.</p>

        <ul>

        <li><p>If only the default fields are configured (First Name, Last Name,
        Email, and Guest Emails), then only those 4 values need to be
        returned.</p>

        </li>

        <li><p>If any optional questions are configured, values for those must
        also be included in the booking request.</p>

        </li>

        </ul>

        </li>

        <li><p><code>name</code> — A <strong>string</strong> of the Field
        label.</p>

        </li>

        <li><p><code>type</code> — A <strong>string</strong> that represents the
        input type (e.g., <code>text</code>)</p>

        </li>

        <li><p><code>readOnly</code> — A <strong>boolean</strong> that signifies
        whether a field can be edited. This value is based on the settings
        defined in the Meeting Type configuration.</p>

        </li>

        <li><p><code>required</code> — A <strong>boolean</strong> that signifies
        whether a field is mandatory. This value is based on the settings
        defined in the Meeting Type configuration.</p>

        </li>

        <li><p><code>validation</code> — An optional <strong>string</strong>
        that represents the type of validation to apply to the input. The only
        supported value is <code>email</code>, which signals that the input
        should be validated as a properly formatted email address. If no value
        is provided, standard text validation (e.g., checking for non-empty
        input if the field is required) is assumed.</p>

        </li>

        <li><p><code>isAdditionalQuestion</code> — A <strong>boolean</strong>
        that signifies whether the field is an additional custom question</p>

        </li>

        </ul>

        </li>

        <li><p><code>description</code> — A <strong>string</strong> that
        contains the calendar event description</p>

        </li>

        <li><p><code>customRange</code> — An <strong>object</strong> specifying
        a custom date range available for booking.</p>

        <ul>

        <li><p><code>startTime</code> — A <strong>number</strong> (UNIX
        timestamp) for when the date range begins</p>

        </li>

        <li><p><code>endTime</code> — A <strong>number</strong> (UNIX timestamp)
        for when the date range ends.</p>

        </li>

        <li><p><code>timezone</code> — A <strong>string</strong> representing
        the timezone used in the <a
        href="https://en.wikipedia.org/wiki/List_of_tz_database_time_zones#List">IANA
        Time Zone Database</a> format. (e.g.
        <code>America/Los_Angeles</code>)</p>

        </li>

        </ul>

        </li>

        <li><p><code>redirectURL</code> — A <strong>string</strong> URL that is
        set in the Meeting Type Configuration. This is the URL where the
        prospect should be redirect to upon successful booking.</p>

        </li>

        <li><p><code>internalName</code> — A <strong>string</strong> used
        internally to identify the meeting type. This is set in the Meeting Type
        Configuration.</p>

        </li>

        <li><p><code>pageStyle</code> — An <strong>object</strong> that defines
        branding settings for the scheduling page. This is set in the LeanData
        application.</p>

        <ul>

        <li><code>styleColor</code> — A <strong>string</strong> representing the
        primary hex color code used to theme UI elements (e.g. buttons,
        highlights) on the scheduling page.</li>

        </ul>

        </li>

        <li><p><code>logo</code> — A <strong>string</strong> representing the
        URL of the company logo (uploaded in the LeanData application) to be
        displayed on the scheduling page. If empty, no logo was uploaded to the
        application.</p>

        </li>

        </ul>

        </li>

        <li><p><code>pageInfo</code> — An <strong>object</strong> that contains
        metadata related to the current scheduling request.</p>

        <ul>

        <li><p><code>displayAllPoolAvailability</code> — will always be
        <strong>null</strong> since the round robin pool member (if applicable)
        was already selected in the initial booking.</p>

        </li>

        <li><p><code>round robin pool id</code> — will always be
        <strong>null</strong> since the round robin pool member was already
        selected in the initial booking.</p>

        </li>

        <li><p><code>userIds</code> — An <strong>array</strong> that contains
        the IDs of users involved in the meeting (hosts or pool members) This
        array can be used to display representative names on the scheduling
        calendar.</p>

        </li>

        <li><p><code>prefillFields</code> — An <strong>object</strong> that
        contains form submission data for the prospect, specifically their
        <code>"First Name"</code>, <code>"Last Name"</code>, and
        <code>"Email"</code>. These values can be used to pre-populate the
        prospect's information before finalizing the meeting booking.</p>

        <ul>

        <li><strong>Note</strong>: to receive these pre-populated values, your
        Trigger Node form fields must be mapped to our default First Name, Last
        Name, Email variables.</li>

        </ul>

        </li>

        <li><p><code>isReschedule</code> — A <strong>boolean</strong> indicating
        if the current booking is an attempt to reschedule.</p>

        </li>

        <li><p><code>scheduledTime</code> — A <strong>stringified
        object</strong> containing:</p>

        <ul>

        <li><p><code>startDateTime</code> — A <strong>string</strong> timestamp
        for the start of the meeting.</p>

        </li>

        <li><p><code>endDateTime</code> — A <strong>string</strong> timestamp
        for the end of the meeting.</p>

        </li>

        <li><p><code>timezone</code> — A <strong>string</strong> for the time
        zone used (e.g.,<code>"America/Los_Angeles"</code>).</p>

        </li>

        </ul>

        </li>

        <li><p><code>hostId</code> — A <strong>string</strong> representing the
        SFDC user ID hosting the meeting.</p>

        </li>

        </ul>

        </li>

        <li><p><code>availability</code> — An <strong>object</strong> that
        contains available time slots and a mapping of user indices to user
        IDs.</p>

        <ul>

        <li><p><code>indexToUserIdMap</code> — An <strong>object</strong> that
        maps numeric indices (used in <code>timeSlots</code>) to user IDs from
        the <code>users</code> object.</p>

        </li>

        <li><p><code>timeSlots</code> — An <strong>array</strong> of time slot
        objects that represent available meeting windows. You can use this data
        to render available times on your scheduling UI.</p>

        <ul>

        <li><p><code>start_time</code> — A <strong>number</strong> that
        represents the start time in Unix epoch milliseconds.</p>

        </li>

        <li><p><code>end_time</code> — A <strong>number</strong> that represents
        the end time in Unix epoch milliseconds.</p>

        </li>

        <li><p><code>users</code> — An <strong>array</strong> of
        <strong>numbers</strong> that reference user indices from
        <code>indexToUserIdMap</code>. These represent the users who are
        available during this time slot. You'll need to use the corresponding
        user IDs (from <code>indexToUserIdMap</code>) as part of the request
        payload when booking the meeting.</p>

        </li>

        </ul>

        </li>

        </ul>

        </li>

        <li><p><code>userIdToInfoMap</code> — An <strong>object</strong> that
        maps user IDs to user-specific details used for scheduling.</p>

        <ul>

        <li><p>❗️<strong>Note:</strong> The information in
        <code>userIdToInfoMap</code> is <em><strong>not required</strong></em>
        to build the core calendar UI. It is provided as supplementary
        context.</p>

        </li>

        <li><p><code>[userId]</code> — An <strong>object</strong> where each key
        is a user ID and each value is a user object.</p>

        <ul>

        <li><p><code>FirstName</code> — A <strong>string</strong> that
        represents the user's first name.</p>

        </li>

        <li><p><code>LastName</code> — A <strong>string</strong> that represents
        the user's last name.</p>

        </li>

        <li><p><code>Email</code> — A <strong>string</strong> that represents
        the user's email address.</p>

        </li>

        <li><p><code>TimeZoneSidKey</code> — A <strong>string</strong> that
        represents the user's primary time zone, using the <a
        href="https://null">IANA Time Zone Database</a> format. (e.g.
        <code>America/Los_Angeles</code>)</p>

        </li>

        <li><p><code>ConferenceLink</code> — A <strong>string</strong> that
        represents the user's conferencing URL.</p>

        </li>

        </ul>

        </li>

        </ul>

        </li>

        </ul>
      requestBody:
        content:
          application/json:
            schema:
              type: object
              example:
                meetingId: 91s64s27ep6mqlig89936kqmat76oh2he923ep3p8tckee2ncsog
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
