        <td>Meeting description shown to the prospect.</td>

        </tr>

        <tr>

        <td><code>redirectURL</code></td>

        <td>string</td>

        <td>Post-booking redirect URL (may be empty).</td>

        </tr>

        <tr>

        <td><code>internalName</code></td>

