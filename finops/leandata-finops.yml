specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: LeanData
providerId: leandata
created: '2026-05-25'
modified: '2026-05-25'
reconciled: false
tags:
  - FinOps
  - Cost Management
  - FOCUS
  - RevOps
  - Salesforce
description: >-
  FOCUS-aligned FinOps definition for the LeanData revenue orchestration
  platform. LeanData is a subscription-licensed SaaS billed annually with
  pricing structured around features, Salesforce users/queues, and routed
  objects; implementation services are billed separately. Public dollar
  pricing is not disclosed, so this file describes the billing model
  qualitatively.
sources:
  - https://www.leandata.com/platform/pricing/
  - https://www.leandata.com/platform/orchestration/
  - https://www.leandata.com/platform/bookit/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: LeanData
serviceCategory: Sales and Marketing Software
billingModel:
  pricingCategory: Subscription
  billingFrequency: Annual
  billingCurrency: USD
  chargeCategories:
    - Subscription
    - ProfessionalServices
    - Tax
    - Credit
    - Adjustment
  primaryUnit: license
  secondaryUnits:
    - user
    - queue
    - object
    - feature
  units:
    - name: license
      description: Per-edition annual platform license (Standard, Advanced, Premium, Enterprise; BookIt SKUs; Buying Groups).
    - name: user
      description: Salesforce user counted toward LeanData seat sizing.
    - name: queue
      description: Salesforce queue routed through LeanData orchestration.
    - name: object
      description: Routed Salesforce object type (Lead, Contact, Account, Opportunity, Case, custom).
    - name: feature
      description: Premium feature add-on (e.g., territory matching, channel/partner GTM, scheduled automations).
commitmentModels:
  - name: Annual Subscription
    description: Standard yearly term with auto-renewal; multi-year contracts negotiated with Sales.
  - name: Implementation Services
    description: Optional fixed-fee implementation, configuration, and migration services.
  - name: Enterprise Dedicated Resources
    description: Enterprise edition includes a dedicated Account Manager and CSM; sandbox and production environments.
discounts:
  - name: Multi-Year Commitment
    description: Negotiated discounts for multi-year commitments (contact sales).
  - name: Volume / Enterprise
    description: Volume pricing tied to total Salesforce users, queues, and routed objects.
focusMapping:
  - focusField: ServiceCategory
    value: Sales and Marketing Software
  - focusField: ChargeCategory
    value: Subscription
  - focusField: BillingPeriod
    value: Annual
  - focusField: PricingUnit
    value: license
notes: >-
  LeanData's cost surface is opaque relative to usage-metered SaaS; the
  primary cost levers are edition selection, number of Salesforce users
  attached to LeanData routing, number of routed objects, and feature
  add-ons. Implementation services are a meaningful one-time line item and
  should be tracked separately as ProfessionalServices in FOCUS.
